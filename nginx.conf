server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: every path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
